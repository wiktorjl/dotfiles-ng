# ~/.tmux.conf  —  developer QOL only
# Reload: prefix + r

# ─── Core ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true color passthrough
set -sg escape-time 0                              # no ESC delay in vim
set -g history-limit 100000
set -g focus-events on                             # vim autoread, etc.
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g allow-rename off
set -g detach-on-destroy off                       # jump to next session on kill
set -g set-clipboard on                            # OSC 52 clipboard over SSH
set -g display-time 4000                           # messages linger long enough to read
set -g status-keys emacs                           # readline-style editing at `prefix :`
setw -g aggressive-resize on                       # resize panes per active client, not smallest

# ─── Copy mode (vi) ────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel       'xclip -in -selection clipboard'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear 'xclip -in -selection clipboard'
# Wayland: replace xclip lines with `wl-copy`
# macOS:   replace xclip lines with `pbcopy`

# ─── Splits & windows (open in CWD) ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane navigation (vim hjkl) ────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable resize: hold prefix, tap H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window / session navigation ───────────────────────────────────────────
bind -r C-p previous-window
bind -r C-n next-window
bind Tab    last-window
bind C-s    choose-tree -Zs                        # fuzzy session picker

# ─── Reload ────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "reloaded"

# ─── Minimal status bar ────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style 'fg=colour255,bg=colour234'
set -g status-left  '#[fg=colour232,bg=colour202,bold]#{?client_prefix, PFX ,}#[fg=colour255,bg=colour234,bold] [#S] '
set -g status-left-length 30
set -g status-right '#[fg=colour255,bg=colour234] %H:%M  %d/%m '
setw -g window-status-current-style 'fg=colour232,bg=colour14,bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-format         ' #I:#W#F '
set -g message-style 'fg=colour232,bg=colour14,bold'
set -g pane-active-border-style 'fg=colour14'
set -g pane-border-style        'fg=colour234'
